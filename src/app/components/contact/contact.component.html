<div class="contact-container">
  
  <h1 class="page-title">{{ 'contact' | translate }}</h1>

  <div class="contact-card">
    
    <p class="contact-intro">{{ 'contact_me' | translate }}</p>

    <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
      
      <div class="form-group">
        <label for="name">{{ 'insert_name' | translate }}</label>
        <input 
          type="text" 
          id="name" 
          required 
          [(ngModel)]="contactData.name" 
          name="name" 
          #name="ngModel"
          [class.invalid]="name.invalid && (name.dirty || name.touched)"
          placeholder="{{ 'insert_name' | translate }}">
        
        <div *ngIf="name.invalid && (name.dirty || name.touched)" class="error-msg">
          <small *ngIf="name.errors?.['required']">{{ 'name_required' | translate }}</small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">{{ 'email' | translate }}</label>
        <input 
          type="email" 
          id="email" 
          required 
          email 
          [(ngModel)]="contactData.email" 
          name="email" 
          #email="ngModel"
          [class.invalid]="email.invalid && (email.dirty || email.touched)"
          placeholder="{{ 'where_i_can_reach_you' | translate }}">
        
        <div *ngIf="email.invalid && (email.dirty || email.touched)" class="error-msg">
          <small *ngIf="email.errors?.['required']">{{ 'email_required' | translate }}</small>
          <small *ngIf="email.errors?.['email']">{{ 'valid_email' | translate }}</small>
        </div>
      </div>

      <div class="form-group">
        <label for="message">{{ 'message' | translate }}</label>
        <textarea 
          id="message" 
          required 
          rows="5"
          [(ngModel)]="contactData.message" 
          name="message" 
          #message="ngModel"
          [class.invalid]="message.invalid && (message.dirty || message.touched)"
          placeholder="{{ 'your_message' | translate }}"></textarea>
        
        <div *ngIf="message.invalid && (message.dirty || message.touched)" class="error-msg">
          <small *ngIf="message.errors?.['required']">{{ 'message_required' | translate }}</small>
        </div>
      </div>

      <button 
        type="submit" 
        class="submit-button" 
        [disabled]="contactForm.invalid || loading">
		<i *ngIf="loading" class="pi pi-spin pi-spinner"></i>
  		<i *ngIf="!loading" class="pi pi-send"></i>
        {{ (loading ? 'sending' : 'send_message') | translate }}
      </button>

    </form>
    
    <div *ngIf="submitted" class="success-message">
      <i class="pi pi-check-circle"></i>
      <p>{{ 'thank_you_message' | translate }}</p>
    </div>

  </div>

  <div class="buttons-wrapper">
    <div class="button-container-left">
      <button class="left-button" routerLink="/projects">{{ 'projects' | translate }}</button>
    </div>
    <div class="button-container-right">
      <button class="right-button" routerLink="/stats">{{ 'stats' | translate }}</button>
    </div>
  </div>

</div>
